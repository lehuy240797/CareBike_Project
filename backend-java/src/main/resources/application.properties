# Server port
server.port=8080

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/care_bike?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
